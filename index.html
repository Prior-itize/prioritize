<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrioritizeIt</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PrioritizeIt">
  <link rel="icon" type="image/png" href="favicon.png?v=3">
  <link rel="apple-touch-icon" href="favicon.png?v=3">
  
  <style>
    body {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(148, 163, 184, 0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3);
      border-radius: 3px;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Drag and Drop visual states */
    .drag-over {
      border: 2px dashed #6366f1 !important;
      background-color: rgba(99, 102, 241, 0.05) !important;
    }
  </style>
</head>
<body class="h-full text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 flex flex-col justify-between overflow-hidden transition-colors duration-200">

  <!-- MAIN LOADING SPINNER -->
  <div id="global-loader" class="fixed inset-0 z-50 bg-white dark:bg-slate-950 flex flex-col items-center justify-center transition-all duration-300">
    <div class="relative w-20 h-20">
      <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-t-indigo-600 dark:border-t-indigo-500 rounded-full animate-spin"></div>
    </div>
    <h1 class="text-slate-800 dark:text-indigo-400 font-extrabold mt-6 tracking-wider text-xl">PrioritizeIt</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Loading your planner...</p>
  </div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="hidden fixed inset-0 z-40 bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4 overflow-y-auto transition-colors duration-200">
    <div class="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-3xl p-6 shadow-xl relative overflow-hidden">
      <div class="hidden dark:block absolute -top-16 -right-16 w-36 h-36 bg-indigo-500/20 rounded-full blur-3xl"></div>
      
      <div class="text-center mb-6 relative z-10">
        <div class="inline-flex p-3.5 bg-slate-900 dark:bg-gradient-to-tr dark:from-indigo-600 dark:to-violet-500 rounded-2xl shadow-md text-white text-2xl mb-4">
          <i class="fa-solid fa-list-check animate-pulse"></i>
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Welcome to PrioritizeIt</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Your simple, everyday priority list</p>
      </div>

      <form id="auth-form" class="space-y-4 relative z-10">
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Email Address</label>
          <input type="email" id="auth-email" required placeholder="name@domain.com" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-850 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-950 dark:text-white outline-none transition text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Password</label>
          <input type="password" id="auth-password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-850 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-950 dark:text-white outline-none transition text-sm">
        </div>

        <div id="auth-error-msg" class="hidden text-rose-500 dark:text-rose-400 text-xs py-2 px-3 bg-rose-50 dark:bg-rose-950/30 border border-rose-200 dark:border-rose-900/50 rounded-lg text-center font-medium"></div>

        <div class="pt-1 flex flex-col gap-2.5">
          <button type="submit" id="btn-login" class="w-full py-3 px-4 bg-slate-900 dark:bg-indigo-600 hover:bg-slate-800 dark:hover:bg-indigo-500 transition-all text-white font-bold rounded-xl shadow-md text-sm flex justify-center items-center gap-2">Log In</button>
          <button type="button" id="btn-register" class="w-full py-3 px-4 bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-300 font-bold rounded-xl text-sm">Create Free Account</button>
          <button type="button" id="btn-google" class="w-full py-2.5 px-4 bg-white dark:bg-slate-850 border border-slate-200 dark:text-white font-bold rounded-xl text-sm flex justify-center items-center gap-2 shadow-sm"><i class="fa-brands fa-google text-red-500"></i> Continue with Google</button>
          <button type="button" id="btn-guest" class="w-full py-2 bg-transparent text-slate-500 dark:text-slate-400 font-semibold rounded-xl text-xs">Continue Offline</button>
        </div>
      </form>
    </div>
  </div>

  <!-- APPLICATION CONTAINER -->
  <div id="app-container" class="hidden h-full flex flex-col justify-between max-w-6xl mx-auto w-full bg-white dark:bg-slate-900 md:shadow-2xl transition-colors duration-200">
    
    <header class="bg-slate-100/90 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800/80 px-4 py-3 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-2.5">
        <div class="w-9 h-9 rounded-xl bg-slate-900 dark:bg-gradient-to-tr dark:from-indigo-600 dark:to-purple-500 flex items-center justify-center shadow-sm">
          <i class="fa-solid fa-list-check text-white text-base"></i>
        </div>
        <div>
          <h1 class="text-base font-extrabold tracking-tight text-slate-900 dark:text-white leading-none">PrioritizeIt</h1>
          <span id="user-display" class="text-[10px] text-slate-500 dark:text-indigo-400 font-semibold tracking-wide block mt-1">loading...</span>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <button id="btn-theme-toggle" class="w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
        <button id="btn-sync-status" class="w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-emerald-400"><i class="fa-solid fa-cloud"></i></button>
        <button id="btn-logout" class="w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-500 hover:text-rose-500"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
      
      <!-- LEFT SIDEBAR: SUBJECTS -->
      <aside class="w-72 border-r border-slate-200 dark:border-slate-800 bg-slate-50/50 dark:bg-slate-950/20 flex flex-col p-4 space-y-4 shrink-0 overflow-y-auto hidden md:flex">
        <div class="flex items-center justify-between">
          <h2 class="text-xs font-black uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-2">
            <i class="fa-solid fa-folder text-indigo-500"></i> Subjects <span id="subject-count-badge" class="text-[10px] lowercase text-slate-400">(0/891)</span>
          </h2>
        </div>

        <div class="bg-white dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800/80 space-y-2 shadow-sm">
          <input type="text" id="input-subject-name" placeholder="Subject Name..." class="w-full px-2.5 py-1.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-850 rounded-lg text-xs text-slate-900 dark:text-white outline-none">
          <button type="button" id="btn-create-subject" class="w-full py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg text-xs transition">Create New Subject</button>
        </div>

        <div id="subjects-tree-root" class="flex-1 space-y-1.5 overflow-y-auto no-scrollbar"></div>
      </aside>

      <!-- MIDDLE PANEL: MAIN LIST VIEW -->
      <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar flex flex-col justify-between">
        
        <!-- Batch Tuning Utility Controls Bar -->
        <div class="bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-850/60 rounded-xl p-2.5 flex flex-wrap items-center justify-between gap-3 shadow-sm">
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1.5 cursor-pointer bg-white dark:bg-slate-900 px-2.5 py-1.5 border border-slate-200 dark:border-slate-800 rounded-lg text-xs font-bold">
              <input type="checkbox" id="checkbox-select-all" class="accent-indigo-500 rounded">
              <span>Select All</span>
            </label>
          </div>

          <div class="flex items-center gap-1.5">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-1">Batch Actions:</span>
            <button type="button" onclick="executeBatchAdjustment(10)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-indigo-50 hover:text-indigo-600 transition">+10%</button>
            <button type="button" onclick="executeBatchAdjustment(-10)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-rose-50 hover:text-rose-600 transition">-10%</button>
            <button type="button" onclick="executeBatchAdjustment(1)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-indigo-50 hover:text-indigo-600 transition">+1%</button>
            <button type="button" onclick="executeBatchAdjustment(-1)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-rose-50 hover:text-rose-600 transition">-1%</button>
          </div>
        </div>

        <!-- MAIN LIST DROPTARGET CONTAINER -->
        <div id="main-droptarget-list" class="flex-1 space-y-3 border-2 border-transparent rounded-2xl p-1 transition-all">
          <div class="flex items-center justify-between px-1">
            <span class="text-xs font-bold uppercase tracking-wider text-slate-500 flex items-center gap-1.5">
              <i class="fa-solid fa-arrow-down-wide-short text-indigo-600"></i>
              <span>My Priority List</span>
            </span>
            <span id="list-counter" class="text-xs text-slate-400 font-medium">0 items</span>
          </div>

          <div id="items-list-container" class="space-y-2.5"></div>

          <div id="empty-state" class="hidden py-12 border border-dashed border-slate-200 dark:border-slate-800 rounded-3xl text-center bg-slate-50/20">
            <h3 class="font-bold text-slate-400 text-xs">Drop subjects or add list items below to start planning</h3>
          </div>
        </div>

        <!-- ENTRY CONSOLE FORM FOOTER -->
        <footer class="bg-slate-100/90 dark:bg-slate-950/90 border border-slate-200 dark:border-slate-850 rounded-2xl p-3 space-y-3 mt-4">
          <form id="add-item-form" class="space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              <div class="md:col-span-2">
                <input type="text" id="input-task-name" required placeholder="What needs to get done?..." class="w-full px-3 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-850 rounded-xl text-sm text-slate-900 dark:text-white outline-none">
              </div>

              <!-- Slider Priority Entry Block -->
              <div class="bg-white dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-850 flex items-center justify-between gap-2">
                <input type="range" id="input-priority-slider" min="0" max="100" value="50" class="flex-1 h-1.5 bg-slate-100 dark:bg-slate-950 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                <div class="flex items-center bg-slate-50 dark:bg-slate-950 px-2 py-1 rounded-lg border border-slate-200 dark:border-slate-800">
                  <input type="number" id="input-priority-number" min="0" max="100" value="50" class="w-12 text-center text-xs font-black text-indigo-500 bg-transparent outline-none">
                  <span class="text-xs font-bold text-indigo-500 pr-1">%</span>
                </div>
              </div>
            </div>

            <!-- ADVANCED ACCORDION -->
            <div class="border border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900/40 overflow-hidden">
              <button type="button" id="btn-toggle-advanced" class="w-full px-3 py-2 flex items-center justify-between text-xs font-bold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900/50 transition">
                <span>Extra Options (Schedule & Priority Changes)</span>
                <i id="advanced-chevron" class="fa-solid fa-chevron-down transition-transform"></i>
              </button>

              <div id="advanced-drawer" class="hidden border-t border-slate-150 dark:border-slate-850 p-3 space-y-3 bg-slate-50/40 dark:bg-slate-950/20">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  
                  <div class="space-y-1.5">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" id="checkbox-enable-scaling" class="accent-indigo-500 rounded text-xs">
                      <span class="text-xs font-bold">Change Priority Over Time</span>
                    </label>
                    <div id="scaling-sub-inputs" class="hidden pl-5 grid grid-cols-2 gap-2">
                      <input type="number" id="input-scale-target" min="0" max="100" placeholder="Target %" class="w-full px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                      <input type="text" id="input-scale-duration-string" placeholder="DD/HH/MM" class="w-full px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                    </div>
                  </div>

                  <div class="space-y-1.5">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" id="checkbox-enable-recurrence" class="accent-indigo-500 rounded text-xs">
                      <span class="text-xs font-bold">Repeat This Task</span>
                    </label>
                    <div id="recurrence-sub-inputs" class="hidden pl-5 grid grid-cols-2 gap-2">
                      <select id="select-recurrence-type" class="w-full px-1.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                        <option value="days">Every X Days</option>
                        <option value="fixed">Fixed Calendar Date</option>
                      </select>
                      <input type="text" id="input-recurrence-value" placeholder="e.g., 7 or YYYY-MM-DD" class="w-full px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                    </div>
                  </div>

                </div>
              </div>
            </div>

            <button type="submit" class="w-full py-2.5 bg-slate-900 dark:bg-indigo-600 hover:bg-slate-800 dark:hover:bg-indigo-500 text-white font-extrabold rounded-xl transition text-sm">Add New Task</button>
          </form>
        </footer>
      </main>

    </div>
  </div>

  <div id="custom-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl max-w-sm w-full p-5 shadow-2xl">
      <h4 class="font-bold text-slate-900 dark:text-white text-base mb-2" id="modal-title">Attention</h4>
      <p class="text-slate-600 dark:text-slate-300 text-xs leading-relaxed" id="modal-message">Context info</p>
      <div class="flex justify-end gap-2 mt-4">
        <button id="modal-cancel-btn" class="hidden px-4 py-2 bg-slate-100 dark:bg-slate-800 text-xs font-bold rounded-lg">Cancel</button>
        <button id="modal-confirm-btn" class="px-4 py-2 bg-slate-900 dark:bg-indigo-600 text-white text-xs font-bold rounded-lg">OK</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'prioritizeit-app';
    const explicitFirebaseConfig = {
      apiKey: "AIzaSyDY9JucQ_cr4vitr_FknxpBhw-n5639smM",
      authDomain: "prioritizeit-97021.firebaseapp.com",
      projectId: "prioritizeit-97021",
      storageBucket: "prioritizeit-97021.firebasestorage.app",
      messagingSenderId: "737987066459",
      appId: "1:737987066459:web:61bc646c298b6bdfff1d7e"
    };

    let auth, db, currentUser = null;
    let firebaseEnabled = false;
    
    // Core Application Arrays Managed Locally/Synched via Database streams
    let itemsData = [];
    let subjectsData = []; 
    let activeDroppedSubjectFilters = []; 
    let activeDragSubjectId = null;

    // DOM Binding Elements
    const globalLoader = document.getElementById('global-loader');
    const authScreen = document.getElementById('auth-screen');
    const appContainer = document.getElementById('app-container');
    const itemsListContainer = document.getElementById('items-list-container');
    const emptyState = document.getElementById('empty-state');
    const inputSubjectName = document.getElementById('input-subject-name');
    const btnCreateSubject = document.getElementById('btn-create-subject');
    const subjectsTreeRoot = document.getElementById('subjects-tree-root');
    const subjectCountBadge = document.getElementById('subject-count-badge');
    const mainDroptargetList = document.getElementById('main-droptarget-list');
    const checkboxSelectAll = document.getElementById('checkbox-select-all');

    const inputTaskName = document.getElementById('input-task-name');
    const inputPrioritySlider = document.getElementById('input-priority-slider');
    const inputPriorityNumber = document.getElementById('input-priority-number');
    const checkboxEnableScaling = document.getElementById('checkbox-enable-scaling');
    const scalingSubInputs = document.getElementById('scaling-sub-inputs');
    const inputScaleTarget = document.getElementById('input-scale-target');
    const inputScaleDurationString = document.getElementById('input-scale-duration-string');
    
    const checkboxEnableRecurrence = document.getElementById('checkbox-enable-recurrence');
    const recurrenceSubInputs = document.getElementById('recurrence-sub-inputs');
    const selectRecurrenceType = document.getElementById('select-recurrence-type');
    const inputRecurrenceValue = document.getElementById('input-recurrence-value');

    // DOM Elements for Auth and Forms (Fixed missing definitions)
    const addItemForm = document.getElementById('add-item-form');
    const authEmail = document.getElementById('auth-email');
    const authPassword = document.getElementById('auth-password');
    const authErrorMsg = document.getElementById('auth-error-msg');
    const btnLogin = document.getElementById('btn-login');
    const btnRegister = document.getElementById('btn-register');
    const btnGoogle = document.getElementById('btn-google');
    const btnGuest = document.getElementById('btn-guest');
    const btnLogout = document.getElementById('btn-logout');
    const userDisplay = document.getElementById('user-display');
    const btnSyncStatus = document.getElementById('btn-sync-status');
    const btnThemeToggle = document.getElementById('btn-theme-toggle');
    const themeIcon = document.getElementById('theme-icon');

    // Initialization block
    try {
      const app = initializeApp(explicitFirebaseConfig);
      auth = getAuth(app);
      db = getFirestore(app);
      firebaseEnabled = true;
    } catch(e) { console.warn("Fallback to simulation mode active."); }

    // Multi-toggle visibility watchers
    document.getElementById('btn-toggle-advanced').addEventListener('click', () => {
      const drawer = document.getElementById('advanced-drawer');
      const chev = document.getElementById('advanced-chevron');
      drawer.classList.toggle('hidden');
      chev.style.transform = drawer.classList.contains('hidden') ? 'rotate(0deg)' : 'rotate(180deg)';
    });

    checkboxEnableScaling.addEventListener('change', (e) => scalingSubInputs.classList.toggle('hidden', !e.target.checked));
    checkboxEnableRecurrence.addEventListener('change', (e) => recurrenceSubInputs.classList.toggle('hidden', !e.target.checked));
    
    inputPrioritySlider.addEventListener('input', (e) => syncPriorityValues(e.target.value, 'slider'));
    inputPriorityNumber.addEventListener('input', (e) => syncPriorityValues(e.target.value, 'number'));

    // RECURSIVE ENGINE: Parse Nesting Levels & Global Bounds (891 cap verification)
    function getSubjectNestingLevel(subjectId) {
      let level = 1;
      let current = subjectsData.find(s => s.id === subjectId);
      while (current && current.parentId) {
        level++;
        current = subjectsData.find(s => s.id === current.parentId);
      }
      return level;
    }

    function countRootSubjects() {
      return subjectsData.filter(s => !s.parentId).length;
    }

    // CREATE SUBJECT ACTION
    btnCreateSubject.addEventListener('click', async () => {
      const name = inputSubjectName.value.trim();
      if (!name) return;

      if (countRootSubjects() >= 99) {
        alert("Action Restricted: Root boundaries limit reached (Max 99 standalone subjects allowed).");
        return;
      }
      if (subjectsData.length >= 891) {
        alert("Action Restricted: System limit reached (Max 891 total subjects allowed).");
        return;
      }

      const newSubject = {
        id: crypto.randomUUID(),
        name: name,
        parentId: null,
        isDroppedInMainList: false
      };

      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'subjects', newSubject.id), newSubject);
      } else {
        subjectsData.push(newSubject);
        saveAndRenderOfflineWorkspace();
      }
      inputSubjectName.value = '';
    });

    // NESTED RENDER PIPELINE FOR SUBJECT TREE BAR SIDEBAR (Closed dropdown style rules)
    function renderSubjectsTree() {
      subjectsTreeRoot.innerHTML = '';
      subjectCountBadge.innerText = `(${subjectsData.length}/891)`;
      
      const roots = subjectsData.filter(s => !s.parentId);
      roots.forEach(root => {
        subjectsTreeRoot.appendChild(buildSubjectDOMNode(root, 1));
      });
    }

    function buildSubjectDOMNode(subject, level) {
      const container = document.createElement('div');
      container.className = "space-y-1 pl-1.5 py-0.5 border-l border-slate-200/60 dark:border-slate-800/60 ml-1";
      
      const nodeEl = document.createElement('div');
      nodeEl.className = "group flex items-center justify-between text-xs font-medium px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-850 rounded-lg cursor-grab transition hover:border-indigo-500 shadow-sm";
      nodeEl.setAttribute('draggable', 'true');
      
      // Drag lifecycle handles
      nodeEl.addEventListener('dragstart', (e) => {
        activeDragSubjectId = subject.id;
        e.dataTransfer.setData('text/plain', subject.id);
      });

      nodeEl.innerHTML = `
        <div class="flex items-center gap-1.5 truncate">
          <i class="fa-solid fa-folder-closed text-slate-400 dark:text-slate-600 text-[11px]"></i>
          <span class="truncate font-semibold text-slate-700 dark:text-slate-300">${subject.name}</span>
        </div>
        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          ${level < 9 ? `<button onclick="triggerInlineSubnest('${subject.id}', ${level})" class="w-4 h-4 rounded hover:bg-slate-100 dark:hover:bg-slate-800 flex items-center justify-center text-[9px] text-slate-500" title="Add a sub-subject"><i class="fa-solid fa-plus"></i></button>` : ''}
          <button onclick="deleteSubject('${subject.id}')" class="w-4 h-4 rounded hover:bg-rose-50 dark:hover:bg-rose-950 text-[9px] text-slate-400 hover:text-rose-500 flex items-center justify-center"><i class="fa-solid fa-trash"></i></button>
        </div>
      `;

      container.appendChild(nodeEl);

      // Recursive Subnest mapping calls
      const subChildren = subjectsData.filter(s => s.parentId === subject.id);
      subChildren.forEach(child => {
        container.appendChild(buildSubjectDOMNode(child, level + 1));
      });

      return container;
    }

    // GLOBAL INLINE UTILITIES EXPOSED TO DOM
    window.triggerInlineSubnest = async function(parentId, currentLevel) {
      if (subjectsData.length >= 891) {
        alert("Limit reached (Max 891 items total).");
        return;
      }
      const subName = prompt("Enter sub-subject nested layer name:");
      if (!subName) return;

      const newSub = {
        id: crypto.randomUUID(),
        name: subName.trim(),
        parentId: parentId,
        isDroppedInMainList: false
      };

      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'subjects', newSub.id), newSub);
      } else {
        subjectsData.push(newSub);
        saveAndRenderOfflineWorkspace();
      }
    };

    window.deleteSubject = async function(id) {
      if (confirm("Delete this subject and all its sub-nested layers?")) {
        const collectChildrenIds = (targetId) => {
          let list = [targetId];
          subjectsData.filter(s => s.parentId === targetId).forEach(c => {
            list = list.concat(collectChildrenIds(c.id));
          });
          return list;
        };

        const targetIds = collectChildrenIds(id);
        if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
          for (let target of targetIds) {
            await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'subjects', target));
          }
        } else {
          subjectsData = subjectsData.filter(s => !targetIds.includes(s.id));
          saveAndRenderOfflineWorkspace();
        }
      }
    };

    // DRAG AND DROP HANDLING OVER MATRIX LAYOUT (Open dropdown status inside list area)
    mainDroptargetList.addEventListener('dragover', (e) => {
      e.preventDefault();
      mainDroptargetList.classList.add('drag-over');
    });

    mainDroptargetList.addEventListener('dragleave', () => {
      mainDroptargetList.classList.remove('drag-over');
    });

    mainDroptargetList.addEventListener('drop', async (e) => {
      e.preventDefault();
      mainDroptargetList.classList.remove('drag-over');
      const subjectId = e.dataTransfer.getData('text/plain') || activeDragSubjectId;
      if (!subjectId) return;

      if (!activeDroppedSubjectFilters.includes(subjectId)) {
        activeDroppedSubjectFilters.push(subjectId);
        if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
          await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'subjects', subjectId), { isDroppedInMainList: true });
        } else {
          const sub = subjectsData.find(s => s.id === subjectId);
          if (sub) sub.isDroppedInMainList = true;
          saveAndRenderOfflineWorkspace();
        }
      }
    });

    // TIME PARSE UTILITY ENGINE: Converts custom strings formatted DD/HH/MM into Milliseconds
    function parseDurationStringtoMs(str) {
      const regex = /^(\d+)\/(\d+)\/(\d+)$/;
      const match = String(str).trim().match(regex);
      if (!match) return 0;

      const days = parseInt(match[1]) || 0;
      const hours = parseInt(match[2]) || 0;
      const minutes = parseInt(match[3]) || 0;

      // Calculate total time parameter in milliseconds
      return ((days * 24 * 60 * 60) + (hours * 60 * 60) + (minutes * 60)) * 1000;
    }

    // Dynamic color picker helper for the newly added priority bars
    function getProgressBarColor(priority) {
      if (priority >= 80) {
        return "bg-rose-500";
      } else if (priority <= 30) {
        return "bg-emerald-500";
      } else {
        return "bg-indigo-500";
      }
    }

    // MAIN WORKSPACE RECALCULATION & COMBINED TASK LIST PIPELINE RENDERER
    function processAndRenderWorkspace() {
      itemsListContainer.innerHTML = '';
      
      const now = new Date();
      let displayedItemsCount = 0;

      // Group rendering matching active dropped filters
      const subjectsToRender = subjectsData.filter(s => s.isDroppedInMainList || activeDroppedSubjectFilters.includes(s.id));
      
      // Render Filter Groups
      subjectsToRender.forEach(subj => {
        const groupWrapper = document.createElement('div');
        groupWrapper.className = "bg-slate-100/60 dark:bg-slate-950/40 border border-slate-200 dark:border-slate-850/80 rounded-2xl p-3 space-y-2";
        groupWrapper.innerHTML = `
          <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-1.5 mb-1">
            <span class="text-xs font-extrabold text-indigo-600 dark:text-indigo-400 flex items-center gap-1">
              <i class="fa-solid fa-folder-open"></i> ${subj.name} <span class="text-[10px] font-medium text-slate-400">(Subject Group Open)</span>
            </span>
            <button onclick="removeSubjectFilterFromMainList('${subj.id}')" class="text-slate-400 hover:text-rose-500 text-[10px] font-bold">Remove Group</button>
          </div>
          <div id="group-container-${subj.id}" class="space-y-2"></div>
        `;
        itemsListContainer.appendChild(groupWrapper);
      });

      // Render items
      itemsData.forEach(item => {
        // Calculate Recurrence loops if needed
        if (item.recurrence && item.recurrence.enabled) {
          const nextTrigger = new Date(item.recurrence.nextOccurrenceDate);
          if (now >= nextTrigger) {
            // Cycle item window onwards forward
            if (item.recurrence.type === 'days') {
              const deltaDays = parseInt(item.recurrence.value) || 1;
              nextTrigger.setDate(nextTrigger.getDate() + deltaDays);
            } else {
              // Custom fixed point reset target triggers next year loop iteration
              nextTrigger.setFullYear(nextTrigger.getFullYear() + 1);
            }
            item.recurrence.nextOccurrenceDate = nextTrigger.toISOString();
            item.priority = item.recurrence.baseResetPriorityValue || item.priority; // Restore priority
            if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
              updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', item.id), { recurrence: item.recurrence, priority: item.priority });
            }
          }
        }

        // Calculate dynamic scaling variations via parsed custom duration limits
        let liveComputedPriority = parseInt(item.priority) || 0;
        let scalingStatsLog = "";

        if (item.dynamicScale && item.dynamicScale.enabled && item.dynamicScale.durationMs > 0) {
          const genesisMs = new Date(item.dynamicScale.startedAt).getTime();
          const currentMs = now.getTime();
          const targetValue = parseInt(item.dynamicScale.targetPriority) || 0;
          const totalDuration = item.dynamicScale.durationMs;

          const elapsedMs = currentMs - genesisMs;
          if (elapsedMs >= totalDuration) {
            liveComputedPriority = targetValue;
            scalingStatsLog = "Target priority reached!";
          } else {
            const ratio = elapsedMs / totalDuration;
            const baseline = parseInt(item.priority) || 0;
            liveComputedPriority = Math.round(baseline + (targetValue - baseline) * ratio);
            liveComputedPriority = Math.max(0, Math.min(100, liveComputedPriority));
            scalingStatsLog = `Shifting progress: ${liveComputedPriority}% (Adjusting...)`;
          }
        }

        displayedItemsCount++;

        // Construct Card Template Element with embedded, dynamic visual percentage bar
        const card = document.createElement('div');
        card.className = "flex flex-col p-3 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl shadow-sm gap-2.5 transition-all duration-300";
        card.innerHTML = `
          <div class="flex items-center justify-between gap-3">
            <div class="flex items-center gap-2.5 min-w-0 flex-1">
              <input type="checkbox" data-item-id="${item.id}" class="task-select-checkbox accent-indigo-500 rounded cursor-pointer">
              <div class="truncate">
                <span class="text-xs font-bold text-slate-800 dark:text-slate-200 block truncate">${item.name}</span>
                ${scalingStatsLog ? `<span class="text-[9px] font-semibold text-indigo-500 block mt-0.5"><i class="fa-solid fa-clock-rotate-left"></i> ${scalingStatsLog}</span>` : ''}
              </div>
            </div>
            <div class="flex items-center gap-2 shrink-0">
              <span class="text-xs font-black text-indigo-600 dark:text-indigo-400 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 px-2 py-1 rounded-lg transition-all duration-300">${liveComputedPriority}%</span>
              <button onclick="deleteActionTask('${item.id}')" class="w-6 h-6 rounded bg-slate-50 dark:bg-slate-950 text-slate-400 hover:text-rose-500 flex items-center justify-center text-xs"><i class="fa-solid fa-trash-can"></i></button>
            </div>
          </div>
          <!-- Micro progress bar showing visually how far prioritized the task is -->
          <div class="w-full bg-slate-100 dark:bg-slate-950 h-1 rounded-full overflow-hidden">
            <div class="h-full rounded-full transition-all duration-300 ${getProgressBarColor(liveComputedPriority)}" style="width: ${liveComputedPriority}%"></div>
          </div>
        `;

        // Routing checks to evaluate if task item belongs to custom dropped sub-container or standard root zone
        if (item.associatedSubjectId && document.getElementById(`group-container-${item.associatedSubjectId}`)) {
          document.getElementById(`group-container-${item.associatedSubjectId}`).appendChild(card);
        } else {
          itemsListContainer.appendChild(card);
        }
      });

      // Evaluate Toggle Empty state conditions layouts
      emptyState.classList.toggle('hidden', displayedItemsCount > 0);
      document.getElementById('list-counter').innerText = `${displayedItemsCount} tasks active`;
    }

    // EXPOSED GLOBAL UTILITY MODIFIERS INTERFACES
    window.removeSubjectFilterFromMainList = async function(id) {
      activeDroppedSubjectFilters = activeDroppedSubjectFilters.filter(f => f !== id);
      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'subjects', id), { isDroppedInMainList: false });
      } else {
        const sub = subjectsData.find(s => s.id === id);
        if (sub) sub.isDroppedInMainList = false;
        saveAndRenderOfflineWorkspace();
      }
    };

    window.deleteActionTask = async function(id) {
      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', id));
      } else {
        itemsData = itemsData.filter(i => i.id !== id);
        saveAndRenderOfflineWorkspace();
      }
    };

    // BATCH OPERATION UTILITY CONTROLLER (GMAIL BOX CHECK SYSTEM)
    checkboxSelectAll.addEventListener('change', (e) => {
      document.querySelectorAll('.task-select-checkbox').forEach(box => {
        box.checked = e.target.checked;
      });
    });

    window.executeBatchAdjustment = async function(percentageDelta) {
      const selectedBoxes = document.querySelectorAll('.task-select-checkbox:checked');
      if (selectedBoxes.length === 0) {
        alert("Please check at least one task row to apply the batch changes.");
        return;
      }

      for (let box of selectedBoxes) {
        const id = box.getAttribute('data-item-id');
        const item = itemsData.find(i => i.id === id);
        if (item) {
          let updatedPriority = (parseInt(item.priority) || 0) + percentageDelta;
          updatedPriority = Math.max(0, Math.min(100, updatedPriority));
          
          item.priority = updatedPriority;
          if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
            await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', id), { priority: updatedPriority });
          }
        }
      }

      if (!firebaseEnabled || currentUser?.isAnonymous) {
        saveAndRenderOfflineWorkspace();
      }
      checkboxSelectAll.checked = false;
    };

    // FORM HANDLE
    addItemForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = inputTaskName.value.trim();
      if (!name) return;

      const basePriority = parseInt(inputPrioritySlider.value) || 0;
      
      const payload = {
        id: crypto.randomUUID(),
        name: name,
        priority: basePriority,
        createdAt: new Date().toISOString(),
        associatedSubjectId: activeDroppedSubjectFilters[0] || null // Binds implicitly to the active filtered drop zone context if open
      };

      // Advanced Form Configurations Mapping Check parsing
      if (checkboxEnableScaling.checked) {
        const parsedMs = parseDurationStringtoMs(inputScaleDurationString.value);
        if (parsedMs > 0) {
          payload.dynamicScale = {
            enabled: true,
            targetPriority: parseInt(inputScaleTarget.value) || 0,
            durationMs: parsedMs,
            startedAt: new Date().toISOString()
          };
        }
      }

      if (checkboxEnableRecurrence.checked) {
        let triggerDate = new Date();
        if (selectRecurrenceType.value === 'days') {
          const factor = parseInt(inputRecurrenceValue.value) || 1;
          triggerDate.setDate(triggerDate.getDate() + factor);
        } else {
          triggerDate = new Date(inputRecurrenceValue.value || new Date());
        }

        payload.recurrence = {
          enabled: true,
          type: selectRecurrenceType.value,
          value: inputRecurrenceValue.value,
          nextOccurrenceDate: triggerDate.toISOString(),
          baseResetPriorityValue: basePriority
        };
      }

      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', payload.id), payload);
      } else {
        itemsData.push(payload);
        saveAndRenderOfflineWorkspace();
      }

      // Reset Inputs Form elements
      inputTaskName.value = '';
      syncPriorityValues(50);
      checkboxEnableScaling.checked = false;
      scalingSubInputs.classList.add('hidden');
      checkboxEnableRecurrence.checked = false;
      recurrenceSubInputs.classList.add('hidden');
    });

    // Bi-directional slider & input sync helper
    function syncPriorityValues(val, origin) {
      let numVal = parseInt(val);
      if (isNaN(numVal)) numVal = 0;
      const clampedVal = Math.max(0, Math.min(100, numVal));
      
      if (origin !== 'slider') {
        inputPrioritySlider.value = clampedVal;
      }
      if (origin !== 'number') {
        inputPriorityNumber.value = clampedVal;
      }
    }

    // STORAGE OFFLINE WRAPPERS
    function saveAndRenderOfflineWorkspace() {
      localStorage.setItem(`prioritizeit_local_items`, JSON.stringify(itemsData));
      localStorage.setItem(`prioritizeit_local_subjects`, JSON.stringify(subjectsData));
      renderSubjectsTree();
      processAndRenderWorkspace();
    }

    function loadAndRenderOfflineWorkspace() {
      itemsData = JSON.parse(localStorage.getItem(`prioritizeit_local_items`) || '[]');
      subjectsData = JSON.parse(localStorage.getItem(`prioritizeit_local_subjects`) || '[]');
      renderSubjectsTree();
      processAndRenderWorkspace();
    }

    // AUTH SEED ROUTINES LIFECYCLE WATCHERS
    window.addEventListener('DOMContentLoaded', () => {
      if (firebaseEnabled) {
        onAuthStateChanged(auth, (user) => {
          globalLoader.classList.add('opacity-0', 'pointer-events-none');
          if (user) {
            currentUser = user;
            authScreen.classList.add('hidden');
            appContainer.classList.remove('hidden');
            document.getElementById('user-display').innerText = user.isAnonymous ? "Guest Offline Account" : user.email;
            
            // Connect Synchronized Real-time Firestore Channels
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'priorities'), (snap) => {
              itemsData = []; snap.forEach(d => itemsData.push(d.data()));
              processAndRenderWorkspace();
            });
            onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'subjects'), (snap) => {
              subjectsData = []; snap.forEach(d => subjectsData.push(d.data()));
              activeDroppedSubjectFilters = subjectsData.filter(s => s.isDroppedInMainList).map(s => s.id);
              renderSubjectsTree();
              processAndRenderWorkspace();
            });

          } else {
            appContainer.classList.add('hidden');
            authScreen.classList.remove('hidden');
          }
        });
      } else {
        globalLoader.classList.add('opacity-0', 'pointer-events-none');
        appContainer.classList.remove('hidden');
        loadAndRenderOfflineWorkspace();
      }
    });

    document.getElementById('btn-guest').addEventListener('click', () => {
      if (firebaseEnabled) signInAnonymously(auth);
      else loadAndRenderOfflineWorkspace();
    });

    document.getElementById('btn-logout').addEventListener('click', () => {
      if (firebaseEnabled) signOut(auth);
    });
  </script>
</body>
</html>
