<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PrioritizeIt</title>
  
  <!-- Touch drag and drop support for mobile and iPhones -->
  <script src="https://cdn.jsdelivr.net/npm/drag-drop-touch@1.3.0/DragDropTouch.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          }
        }
      }
    }
  </script>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="PrioritizeIt">
  <link class="favicon" rel="icon" type="image/png" href="favicon.png?v=3">
  <link class="apple-touch-icon" href="favicon.png?v=3">
  
  <style>
    body {
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: rgba(148, 163, 184, 0.1);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(148, 163, 184, 0.3);
      border-radius: 3px;
    }
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    /* Drag and Drop visual states */
    .drag-over {
      border: 2px dashed #6366f1 !important;
      background-color: rgba(99, 102, 241, 0.05) !important;
    }
  </style>
</head>
<body class="h-full text-slate-800 dark:text-slate-100 bg-slate-50 dark:bg-slate-950 flex flex-col justify-between overflow-hidden transition-colors duration-200">

  <!-- MAIN LOADING SPINNER -->
  <div id="global-loader" class="fixed inset-0 z-50 bg-white dark:bg-slate-950 flex flex-col items-center justify-center transition-all duration-300">
    <div class="relative w-20 h-20">
      <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
      <div class="absolute inset-0 border-4 border-t-indigo-600 dark:border-t-indigo-500 rounded-full animate-spin"></div>
    </div>
    <h1 class="text-slate-800 dark:text-indigo-400 font-extrabold mt-6 tracking-wider text-xl">PrioritizeIt</h1>
    <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Loading your planner...</p>
  </div>

  <!-- SIDEBAR BACKDROP OVERLAY (Only for mobile viewports) -->
  <div id="sidebar-overlay" class="fixed inset-0 z-30 bg-slate-950/40 hidden backdrop-blur-sm transition-all duration-300"></div>

  <!-- AUTH SCREEN -->
  <div id="auth-screen" class="hidden fixed inset-0 z-45 bg-slate-50 dark:bg-slate-950 flex items-center justify-center p-4 overflow-y-auto transition-colors duration-200">
    <div class="w-full max-w-md bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl p-6 shadow-[0_12px_40px_rgba(0,0,0,0.18)] dark:shadow-[0_12px_40px_rgba(0,0,0,0.6)] relative overflow-hidden">
      <div class="hidden dark:block absolute -top-16 -right-16 w-36 h-36 bg-indigo-500/20 rounded-full blur-3xl"></div>
      
      <div class="text-center mb-6 relative z-10 flex flex-col items-center">
        <!-- New Visual Brand Logo with safe load fallbacks -->
        <div class="inline-flex mb-4 items-center justify-center">
          <img src="logo.png" alt="PrioritizeIt Logo" class="h-16 object-contain" onerror="this.onerror=null; this.outerHTML='<div class=\'p-3.5 bg-slate-900 dark:bg-gradient-to-tr dark:from-indigo-600 dark:to-violet-500 rounded-xl shadow-md text-white text-2xl\'><i class=\'fa-solid fa-list-check animate-pulse\'></i></div>'">
        </div>
        <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Welcome to PrioritizeIt</h2>
        <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Your simple, everyday priority list</p>
      </div>

      <form id="auth-form" class="space-y-4 relative z-10">
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Email Address</label>
          <input type="email" id="auth-email" required placeholder="name@domain.com" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-900/60 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-950 dark:text-white outline-none transition text-sm">
        </div>
        <div>
          <label class="block text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider mb-1.5 pl-1">Password</label>
          <input type="password" id="auth-password" required placeholder="••••••••" class="w-full px-4 py-3 bg-slate-50 dark:bg-slate-950/60 border border-slate-200 dark:border-slate-800 rounded-xl focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 text-slate-950 dark:text-white outline-none transition text-sm">
        </div>

        <div id="auth-error-msg" class="hidden text-rose-500 dark:text-rose-400 text-xs py-2 px-3 bg-rose-50 dark:bg-rose-950/30 border border-rose-200 dark:border-rose-900/50 rounded-lg text-center font-medium"></div>

        <div class="pt-1 flex flex-col gap-2.5">
          <button type="button" id="btn-login" class="w-full py-3 px-4 bg-slate-900 dark:bg-indigo-600 hover:bg-slate-800 dark:hover:bg-indigo-500 transition-all text-white font-bold rounded-xl shadow-md text-sm flex justify-center items-center gap-2">Log In</button>
          <button type="button" id="btn-register" class="w-full py-3 px-4 bg-slate-100 dark:bg-slate-800 text-slate-800 dark:text-slate-300 font-bold rounded-xl text-sm">Create Free Account</button>
          
          <!-- Beautiful Custom Google Auth Button with perfect Contrast and exact Google colored logo -->
          <button type="button" id="btn-google" class="w-full py-2.5 px-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 font-bold rounded-xl text-sm flex justify-center items-center gap-2 shadow-md transition">
            <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            <span>Continue with Google</span>
          </button>
          
          <button type="button" id="btn-guest" class="w-full py-2 bg-transparent text-slate-500 dark:text-slate-400 font-semibold rounded-xl text-xs">Continue Offline</button>
        </div>
      </form>
    </div>
  </div>

  <!-- APPLICATION CONTAINER -->
  <div id="app-container" class="hidden h-full flex flex-col justify-between max-w-6xl mx-auto w-full bg-white dark:bg-slate-900 md:shadow-[0_12px_40px_rgba(0,0,0,0.18)] dark:md:shadow-[0_12px_40px_rgba(0,0,0,0.6)] transition-colors duration-200 relative">
    
    <!-- DRAG-OUTSIDE VISUAL OVERLAY HIGHLIGHT TARGET -->
    <div id="move-to-main-dropzone" class="hidden fixed md:absolute z-50 border-2 border-dashed border-indigo-500/60 bg-indigo-50/30 dark:bg-indigo-950/20 flex flex-col items-center justify-center transition-all duration-300 rounded-xl pointer-events-auto left-72 md:left-auto right-0 top-0 bottom-0 md:inset-4 shadow-sm">
      <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-805 rounded-lg px-5 py-3.5 shadow-md flex flex-col items-center gap-2 max-w-[200px] text-center">
        <i class="fa-solid fa-folder-open text-indigo-500 text-2xl animate-bounce"></i>
        <span class="text-xs font-bold text-slate-700 dark:text-slate-300">Move to Main List</span>
      </div>
    </div>

    <header class="bg-slate-100/90 dark:bg-slate-950/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800/80 px-4 py-3 flex items-center justify-between sticky top-0 z-20">
      <div class="flex items-center gap-1.5">
        <!-- Expandable Menu Drawer Trigger button (only visible on mobile) -->
        <button id="btn-mobile-menu" class="md:hidden w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm mr-1 active:scale-95 transition-all">
          <i class="fa-solid fa-bars"></i>
        </button>

        <div class="flex items-center gap-2.5">
          <!-- Image Logo integration in header -->
          <div class="flex items-center">
            <img src="logo.png" alt="PrioritizeIt" class="h-8 object-contain shrink-0" onerror="this.onerror=null; this.outerHTML='<div class=\'w-9 h-9 rounded-xl bg-slate-900 dark:bg-gradient-to-tr dark:from-indigo-600 dark:to-purple-500 flex items-center justify-center shadow-md\'><i class=\'fa-solid fa-list-check text-white text-base\'></i></div>'">
          </div>
          <div>
            <h1 class="text-base font-extrabold tracking-tight text-slate-900 dark:text-white leading-none">PrioritizeIt</h1>
            <span id="user-display" class="text-[10px] text-slate-500 dark:text-indigo-400 font-semibold tracking-wide block mt-1">loading...</span>
          </div>
        </div>
      </div>
      
      <div class="flex items-center gap-2">
        <button id="btn-theme-toggle" class="w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-600 dark:text-slate-300 shadow-sm"><i id="theme-icon" class="fa-solid fa-moon"></i></button>
        <button id="btn-sync-status" class="w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-emerald-400 shadow-sm"><i class="fa-solid fa-cloud"></i></button>
        <button id="btn-logout" class="w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-500 hover:text-rose-500 shadow-sm"><i class="fa-solid fa-right-from-bracket"></i></button>
      </div>
    </header>

    <div class="flex-1 flex overflow-hidden relative">
      
      <!-- LEFT SIDEBAR: SUBJECTS (Transforms to slide-in drawer on mobile) -->
      <aside id="sidebar-panel" class="fixed inset-y-0 left-0 z-40 w-72 border-r border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-950 md:bg-slate-50/50 md:dark:bg-slate-950/20 flex flex-col p-4 space-y-4 shrink-0 overflow-y-auto transform -translate-x-full transition-transform duration-300 ease-in-out md:translate-x-0 md:static md:flex">
        
        <div class="flex items-center justify-between">
          <h2 class="text-xs font-black uppercase tracking-wider text-slate-400 dark:text-slate-500 flex items-center gap-2">
            <i class="fa-solid fa-folder text-indigo-500"></i> Subjects <span id="subject-count-badge" class="text-[10px] lowercase text-slate-400">(0/891)</span>
          </h2>
          <!-- Mobile-only Close Sidebar Button -->
          <button id="btn-close-sidebar" class="md:hidden w-8 h-8 rounded-lg bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 transition-colors active:scale-95">
            <i class="fa-solid fa-xmark"></i>
          </button>
        </div>

        <div class="bg-white dark:bg-slate-900 p-3 rounded-xl border border-slate-200 dark:border-slate-800/80 space-y-2 shadow-md">
          <input type="text" id="input-subject-name" placeholder="Subject Name..." class="w-full px-2.5 py-1.5 bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-80 rounded-lg text-xs text-slate-900 dark:text-white outline-none">
          <button type="button" id="btn-create-subject" class="w-full py-1.5 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-lg text-xs transition shadow-sm">Create New Subject</button>
        </div>

        <div id="subjects-tree-root" class="flex-1 space-y-1.5 overflow-y-auto no-scrollbar"></div>
      </aside>

      <!-- MIDDLE PANEL: MAIN LIST VIEW -->
      <main class="flex-1 overflow-y-auto px-4 py-4 space-y-4 no-scrollbar flex flex-col justify-between">
        
        <!-- Batch Tuning Utility Controls Bar -->
        <div class="bg-slate-100 dark:bg-slate-950 border border-slate-200 dark:border-slate-800/65 rounded-xl p-2.5 flex flex-wrap items-center justify-between gap-3 shadow-md">
          <div class="flex items-center gap-2">
            <label class="flex items-center gap-1.5 cursor-pointer bg-white dark:bg-slate-900 px-2.5 py-1.5 border border-slate-200 dark:border-slate-800 rounded-lg text-xs font-bold shadow-md">
              <input type="checkbox" id="checkbox-select-all" class="accent-indigo-500 rounded">
              <span>Select All</span>
            </label>
          </div>

          <div class="flex items-center gap-1.5">
            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mr-1">Batch Actions:</span>
            <button type="button" onclick="executeBatchAdjustment(10)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-indigo-50 hover:text-indigo-600 transition shadow-md">+10%</button>
            <button type="button" onclick="executeBatchAdjustment(-10)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-rose-50 hover:text-rose-600 transition shadow-md">-10%</button>
            <button type="button" onclick="executeBatchAdjustment(1)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-indigo-50 hover:text-indigo-600 transition shadow-md">+1%</button>
            <button type="button" onclick="executeBatchAdjustment(-1)" class="px-2.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 text-slate-700 dark:text-slate-300 rounded-lg text-xs font-black hover:bg-rose-50 hover:text-rose-600 transition shadow-sm">-1%</button>
          </div>
        </div>

        <!-- MAIN LIST DROPTARGET CONTAINER -->
        <div id="main-droptarget-list" class="flex-1 space-y-3 border-2 border-transparent rounded-xl p-1 transition-all">
          <div class="flex items-center justify-between px-1">
            <span class="text-xs font-bold uppercase tracking-wider text-slate-500 flex items-center gap-1.5">
              <i class="fa-solid fa-arrow-down-wide-short text-indigo-600"></i>
              <span>My Priority List</span>
            </span>
            <span id="list-counter" class="text-xs text-slate-400 font-medium">0 items</span>
          </div>

          <div id="items-list-container" class="space-y-2.5 min-h-[150px]"></div>

          <div id="empty-state" class="hidden py-12 border border-dashed border-slate-200 dark:border-slate-800 rounded-xl text-center bg-slate-50/20">
            <h3 class="font-bold text-slate-400 text-xs">Drop subjects or add list items below to start planning</h3>
          </div>
        </div>

        <!-- ENTRY CONSOLE FORM FOOTER -->
        <footer class="bg-slate-100/90 dark:bg-slate-950/90 border border-slate-200 dark:border-slate-800 rounded-xl p-3 space-y-3 mt-4 shadow-lg">
          <form id="add-item-form" class="space-y-3">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-3">
              <div class="md:col-span-2">
                <input type="text" id="input-task-name" required placeholder="What needs to get done?..." class="w-full px-3 py-2.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-80 rounded-xl text-sm text-slate-900 dark:text-white outline-none shadow-sm">
              </div>

              <!-- Slider Priority Entry Block -->
              <div class="bg-white dark:bg-slate-900 p-2 rounded-xl border border-slate-200 dark:border-slate-80 flex items-center justify-between gap-2 shadow-sm">
                <input type="range" id="input-priority-slider" min="0" max="100" value="50" class="flex-1 h-1.5 bg-slate-100 dark:bg-slate-950 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                <div class="flex items-center bg-slate-50 dark:bg-slate-950 px-2 py-1 rounded-lg border border-slate-200 dark:border-slate-800">
                  <input type="number" id="input-priority-number" min="0" max="100" value="50" class="w-12 text-center text-xs font-black text-indigo-500 bg-transparent outline-none">
                  <span class="text-xs font-bold text-indigo-500 pr-1">%</span>
                </div>
              </div>
            </div>

            <!-- ADVANCED ACCORDION -->
            <div class="border border-slate-200 dark:border-slate-800 rounded-xl bg-white dark:bg-slate-900/40 overflow-hidden shadow-sm">
              <button type="button" id="btn-toggle-advanced" class="w-full px-3 py-2 flex items-center justify-between text-xs font-bold text-slate-500 hover:bg-slate-50 dark:hover:bg-slate-900/50 transition">
                <span>Extra Options (Schedule & Priority Changes)</span>
                <i id="advanced-chevron" class="fa-solid fa-chevron-down transition-transform"></i>
              </button>

              <div id="advanced-drawer" class="hidden border-t border-slate-150 dark:border-slate-850 p-3 space-y-3 bg-slate-50/40 dark:bg-slate-950/20">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                  
                  <div class="space-y-1.5">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" id="checkbox-enable-scaling" class="accent-indigo-500 rounded text-xs">
                      <span class="text-xs font-bold">Change Priority Over Time</span>
                    </label>
                    <div id="scaling-sub-inputs" class="hidden pl-5 grid grid-cols-2 gap-2">
                      <input type="number" id="input-scale-target" min="0" max="100" placeholder="Target %" class="w-full px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                      <input type="text" id="input-scale-duration-string" placeholder="DD/HH/MM" class="w-full px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                    </div>
                  </div>

                  <div class="space-y-1.5">
                    <label class="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" id="checkbox-enable-recurrence" class="accent-indigo-500 rounded text-xs">
                      <span class="text-xs font-bold">Repeat This Task</span>
                    </label>
                    <div id="recurrence-sub-inputs" class="hidden pl-5 grid grid-cols-2 gap-2">
                      <select id="select-recurrence-type" class="w-full px-1.5 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-850 rounded-lg text-xs outline-none">
                        <option value="days">Every X Days</option>
                        <option value="fixed">Fixed Calendar Date</option>
                      </select>
                      <input type="text" id="input-recurrence-value" placeholder="e.g., 7 or YYYY-MM-DD" class="w-full px-2 py-1.5 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-lg text-xs outline-none">
                    </div>
                  </div>

                </div>
              </div>
            </div>

            <button type="submit" class="w-full py-2.5 bg-slate-900 dark:bg-indigo-600 hover:bg-slate-800 dark:hover:bg-indigo-500 text-white font-extrabold rounded-xl transition text-sm shadow-md">Add New Task</button>
          </form>
        </footer>
      </main>

    </div>
  </div>

  <div id="custom-modal" class="hidden fixed inset-0 z-50 bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-xl max-w-sm w-full p-5 shadow-2xl">
      <h4 class="font-bold text-slate-900 dark:text-white text-base mb-2" id="modal-title">Attention</h4>
      <p class="text-slate-600 dark:text-slate-300 text-xs leading-relaxed" id="modal-message">Context info</p>
      <div class="flex justify-end gap-2 mt-4">
        <button id="modal-cancel-btn" class="hidden px-4 py-2 bg-slate-100 dark:bg-slate-800 text-xs font-bold rounded-lg">Cancel</button>
        <button id="modal-confirm-btn" class="px-4 py-2 bg-slate-900 dark:bg-indigo-600 text-white text-xs font-bold rounded-lg">OK</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { 
      getAuth, 
      onAuthStateChanged, 
      signOut, 
      signInAnonymously,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, collection, onSnapshot, addDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    const appId = 'prioritizeit-app';
    const explicitFirebaseConfig = {
      apiKey: "AIzaSyDY9JucQ_cr4vitr_FknxpBhw-n5639smM",
      authDomain: "prioritizeit-97021.firebaseapp.com",
      projectId: "prioritizeit-97021",
      storageBucket: "prioritizeit-97021.firebasestorage.app",
      messagingSenderId: "737987066459",
      appId: "1:737987066459:web:61bc646c298b6bdfff1d7e"
    };

    let auth, db, currentUser = null;
    let firebaseEnabled = false;
    
    // Core Application Arrays Managed Locally/Synched via Database streams

    function getSubjectNestingLevel(subjectId) {

      while (current && current.parentId) {
        level++;
        current = subjectsData.find(s => s.id === current.parentId);

      return level;
    }

          moveToMainDropzone.classList.add('hidden');
        }
        nodeEl.classList.remove('z-50', 'opacity-50');

    function parseDurationStringtoMs(str) {
      const regex = /^(\d+)\/(\d+)\/(\d+)$/;
      const match = String(str).trim().match(regex);
      if (!match) return 0;
      const days = parseInt(match[1]) || 0;
      const hours = parseInt(match[2]) || 0;
      const minutes = parseInt(match[3]) || 0;
      return ((days * 24 * 60 * 60) + (hours * 60 * 60) + (minutes * 60)) * 1000;
    }

    window.triggerMobileTaskMoveMenu = async function(task) {
      if (subjectsData.length === 0) {

      else if (num > 0 && num <= subjectsData.length) await updateTaskAssociation(task.id, subjectsData[num - 1].id);
    };

    // MAIN WORKSPACE RECALCULATION & COMBINED TASK LIST PIPELINE RENDERER (Renamed "Remove Group" to "Minimize Group")
    function processAndRenderWorkspace() {
      const now = new Date();
      let displayedItemsCount = 0;

      const subjectsToRender = subjectsData.filter(s => s.isDroppedInMainList || activeDroppedSubjectFilters.includes(s.id));
      const activeSubjectIds = new Set(subjectsToRender.map(s => s.id));
      
      const activeGroupIds = new Set(subjectsToRender.map(s => `group-wrapper-${s.id}`));
      document.querySelectorAll('.subject-group-wrapper').forEach(group => {
        if (!activeGroupIds.has(group.id)) group.remove();
      });

      subjectsToRender.forEach(subj => {
        const groupId = `group-wrapper-${subj.id}`;
        let groupWrapper = document.getElementById(groupId);
        if (!groupWrapper) {
          groupWrapper = document.createElement('div');
          groupWrapper.id = groupId;
          groupWrapper.className = "subject-group-wrapper bg-slate-100/60 dark:bg-slate-950/40 border-2 border-transparent rounded-xl p-3 space-y-2 mb-2.5 transition-all duration-200 shadow-md";
          groupWrapper.innerHTML = `
            <div class="flex items-center justify-between border-b border-slate-200 dark:border-slate-800 pb-1.5 mb-1">
              <span class="text-xs font-extrabold text-indigo-600 dark:text-indigo-400 flex items-center gap-1">
                <i class="fa-solid fa-folder-open"></i> <span class="group-title"></span> <span class="text-[10px] font-medium text-slate-400">(Subject Group)</span>
              </span>
              <button onclick="removeSubjectFilterFromMainList('${subj.id}')" class="text-slate-400 hover:text-rose-500 text-[10px] font-bold">Remove Group</button>
            </div>
            <div id="group-container-${subj.id}" class="space-y-2.5 min-h-[50px] transition-all"></div>
          `;

          // DRAGOVER AND DRAGLEAVE PREVENT BUBBLING TO PARENT CONTAINER
          groupWrapper.addEventListener('dragover', (e) => {
            e.preventDefault();
            e.stopPropagation(); // Stop parent main list container from lighting up as drop target
            e.dataTransfer.dropEffect = 'move';
            groupWrapper.classList.add('border-indigo-500', 'bg-indigo-50/20', 'dark:bg-indigo-950/15');
          });

          groupWrapper.addEventListener('dragleave', (e) => {
            e.stopPropagation();
            groupWrapper.classList.remove('border-indigo-500', 'bg-indigo-50/20', 'dark:bg-indigo-950/15');
          });

          // DROP PREVENTS BUBBLING (CRITICAL: prevents reset of task association to null!)
          groupWrapper.addEventListener('drop', async (e) => {
            e.preventDefault();
            e.stopPropagation(); // Stop parent drop listener from resetting task assignment
            groupWrapper.classList.remove('border-indigo-500', 'bg-indigo-50/20', 'dark:bg-indigo-950/15');
            
            const rawData = e.dataTransfer.getData('text/plain');
            let taskId = null;
            if (rawData && rawData.startsWith('task:')) taskId = rawData.substring(5);
            if (!taskId && activeDragTaskId) taskId = activeDragTaskId;

            if (taskId) {
              await updateTaskAssociation(taskId, subj.id);
              activeDragTaskId = null;
            }
          });

          itemsListContainer.appendChild(groupWrapper);
        }
        groupWrapper.querySelector('.group-title').innerText = subj.name;
      });

      const processedItems = itemsData.map(item => {
        if (item.recurrence && item.recurrence.enabled) {
          const nextTrigger = new Date(item.recurrence.nextOccurrenceDate);
          if (now >= nextTrigger) {
            if (item.recurrence.type === 'days') {
              const deltaDays = parseInt(item.recurrence.value) || 1;
              nextTrigger.setDate(nextTrigger.getDate() + deltaDays);
            } else {
              nextTrigger.setFullYear(nextTrigger.getFullYear() + 1);
            }
            item.recurrence.nextOccurrenceDate = nextTrigger.toISOString();
            item.priority = item.recurrence.baseResetPriorityValue || item.priority; 
            if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
              updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', item.id), { recurrence: item.recurrence, priority: item.priority });
            }
          }
        }

        let liveComputedPriority = parseInt(item.priority) || 0;
        let scalingStatsLog = "";

        if (item.dynamicScale && item.dynamicScale.enabled && item.dynamicScale.durationMs > 0) {
          const genesisMs = new Date(item.dynamicScale.startedAt).getTime();
          const currentMs = now.getTime();
          const targetValue = parseInt(item.dynamicScale.targetPriority) || 0;
          const totalDuration = item.dynamicScale.durationMs;
          const elapsedMs = currentMs - genesisMs;
          if (elapsedMs >= totalDuration) {
            liveComputedPriority = targetValue;
            scalingStatsLog = "Priority change complete!";
          } else {
            const ratio = elapsedMs / totalDuration;
            const baseline = parseInt(item.priority) || 0;
            liveComputedPriority = Math.round(baseline + (targetValue - baseline) * ratio);
            liveComputedPriority = Math.max(0, Math.min(100, liveComputedPriority));
            scalingStatsLog = `Auto-changing: currently at ${liveComputedPriority}%`;
          }
        }

        return { item, liveComputedPriority, scalingStatsLog };
      }).filter(p => {
        if (p.item.associatedSubjectId && !activeSubjectIds.has(p.item.associatedSubjectId)) {
          const oldCard = document.getElementById(`task-card-${p.item.id}`);
          if (oldCard) oldCard.remove();
          return false;
        }
        return true;
      });

      processedItems.sort((a, b) => {
        const priorityDiff = b.liveComputedPriority - a.liveComputedPriority;
        if (priorityDiff !== 0) return priorityDiff;
        return a.item.name.localeCompare(b.item.name);
      });

      const currentTaskIds = new Set(processedItems.map(p => `task-card-${p.item.id}`));
      document.querySelectorAll('.task-card').forEach(card => {
        if (!currentTaskIds.has(card.id)) card.remove();
      });

      processedItems.forEach(p => {
        displayedItemsCount++;
        const card = renderTaskCard(p.item, p.liveComputedPriority, p.scalingStatsLog);
        const hasContainer = p.item.associatedSubjectId && document.getElementById(`group-container-${p.item.associatedSubjectId}`);
        const targetContainer = hasContainer ? document.getElementById(`group-container-${p.item.associatedSubjectId}`) : itemsListContainer;
        if (targetContainer) targetContainer.appendChild(card);
      });

      emptyState.classList.toggle('hidden', displayedItemsCount > 0);
      document.getElementById('list-counter').innerText = `${displayedItemsCount} tasks active`;
    }

    window.removeSubjectFilterFromMainList = async function(id) {
      activeDroppedSubjectFilters = activeDroppedSubjectFilters.filter(f => f !== id);
      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'subjects', id), { isDroppedInMainList: false });
      } else {
        const sub = subjectsData.find(s => s.id === id);
        if (sub) sub.isDroppedInMainList = false;
        saveAndRenderOfflineWorkspace();
      }
    };

    window.deleteActionTask = async function(id) {
      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await deleteDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', id));
      } else {
        itemsData = itemsData.filter(i => i.id !== id);
        saveAndRenderOfflineWorkspace();
      }
    };

    checkboxSelectAll.addEventListener('change', (e) => {
      document.querySelectorAll('.task-select-checkbox').forEach(box => {
        box.checked = e.target.checked;
      });
    });

    window.executeBatchAdjustment = async function(percentageDelta) {
      const selectedBoxes = document.querySelectorAll('.task-select-checkbox:checked');
      if (selectedBoxes.length === 0) {
        alert("Please check at least one task row to apply the batch changes.");
        return;
      }
      for (let box of selectedBoxes) {
        const id = box.getAttribute('data-item-id');
        const item = itemsData.find(i => i.id === id);
        if (item) {
          let updatedPriority = (parseInt(item.priority) || 0) + percentageDelta;
          updatedPriority = Math.max(0, Math.min(100, updatedPriority));
          item.priority = updatedPriority;
          if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
            await updateDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', id), { priority: updatedPriority });
          }
        }
      }
      if (!firebaseEnabled || currentUser?.isAnonymous) saveAndRenderOfflineWorkspace();
      checkboxSelectAll.checked = false;
    };

    function initTheme() {
      const storedTheme = localStorage.getItem('prioritizeit_theme') || 'light';
      setTheme(storedTheme);
    }

    function setTheme(theme) {
      if (theme === 'dark') {
        document.documentElement.classList.add('dark');
        themeIcon.className = "fa-solid fa-sun text-amber-400";
        localStorage.setItem('prioritizeit_theme', 'dark');
      } else {
        document.documentElement.classList.remove('dark');
        themeIcon.className = "fa-solid fa-moon text-slate-600";
        localStorage.setItem('prioritizeit_theme', 'light');
      }
    }

    btnThemeToggle.addEventListener('click', () => {
      const isCurrentlyDark = document.documentElement.classList.contains('dark');
      setTheme(isCurrentlyDark ? 'light' : 'dark');
    });

    initTheme();

    addItemForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = inputTaskName.value.trim();
      if (!name) return;

      const basePriority = parseInt(inputPrioritySlider.value) || 0;
      const payload = {
        id: crypto.randomUUID(),
        name: name,
        priority: basePriority,
        createdAt: new Date().toISOString(),
        associatedSubjectId: null 
      };

      if (checkboxEnableScaling.checked) {
        const parsedMs = parseDurationStringtoMs(inputScaleDurationString.value);
        if (parsedMs > 0) {
          payload.dynamicScale = {
            enabled: true,
            targetPriority: parseInt(inputScaleTarget.value) || 0,
            durationMs: parsedMs,
            startedAt: new Date().toISOString()
          };
        }
      }

      if (checkboxEnableRecurrence.checked) {
        let triggerDate = new Date();
        if (selectRecurrenceType.value === 'days') {
          const factor = parseInt(inputRecurrenceValue.value) || 1;
          triggerDate.setDate(triggerDate.getDate() + factor);
        } else {
          triggerDate = new Date(inputRecurrenceValue.value || new Date());
        }
        payload.recurrence = {
          enabled: true,
          type: selectRecurrenceType.value,
          value: inputRecurrenceValue.value,
          nextOccurrenceDate: triggerDate.toISOString(),
          baseResetPriorityValue: basePriority
        };
      }

      if (firebaseEnabled && currentUser && !currentUser.isAnonymous) {
        await setDoc(doc(db, 'artifacts', appId, 'users', currentUser.uid, 'priorities', payload.id), payload);
      } else {
        itemsData.push(payload);
        saveAndRenderOfflineWorkspace();
      }

      inputTaskName.value = '';
      syncPriorityValues(50);
      checkboxEnableScaling.checked = false;
      scalingSubInputs.classList.add('hidden');
      checkboxEnableRecurrence.checked = false;
      recurrenceSubInputs.classList.add('hidden');
    });

    function syncPriorityValues(val, origin) {
      let numVal = parseInt(val);
      if (isNaN(numVal)) numVal = 0;
      const clampedVal = Math.max(0, Math.min(100, numVal));
      if (origin !== 'slider') inputPrioritySlider.value = clampedVal;
      if (origin !== 'number') inputPriorityNumber.value = clampedVal;
    }

    function saveAndRenderOfflineWorkspace() {
      localStorage.setItem(`prioritizeit_local_items`, JSON.stringify(itemsData));
      localStorage.setItem(`prioritizeit_local_subjects`, JSON.stringify(subjectsData));
      renderSubjectsTree();
      processAndRenderWorkspace();
    }

    function loadAndRenderOfflineWorkspace() {
      itemsData = JSON.parse(localStorage.getItem(`prioritizeit_local_items`) || '[]');
      subjectsData = JSON.parse(localStorage.getItem(`prioritizeit_local_subjects`) || '[]');
      renderSubjectsTree();
      processAndRenderWorkspace();
    }

    function handleUserSession(user) {
      currentUser = user;
      globalLoader.classList.add('opacity-0', 'pointer-events-none');
      activeFirestoreUnsubscribes.forEach(unsub => unsub());
      activeFirestoreUnsubscribes = [];

      if (user) {
        authScreen.classList.add('hidden');
        appContainer.classList.remove('hidden');
        
        if (user.isAnonymous) {
          userDisplay.innerText = "Guest Offline Account";
          btnSyncStatus.innerHTML = `<i class="fa-solid fa-floppy-disk text-slate-400" title="Offline Mode"></i>`;
          loadAndRenderOfflineWorkspace();
        } else {
          userDisplay.innerText = user.email;
          btnSyncStatus.innerHTML = `<i class="fa-solid fa-cloud text-emerald-400" title="Data Synced"></i>`;
          
          if (firebaseEnabled) {
            const unsub1 = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'priorities'), (snap) => {
              itemsData = []; 
              snap.forEach(d => itemsData.push(d.data()));
              processAndRenderWorkspace();
            }, (err) => console.warn("Firestore priorities stream error:", err));
            
            const unsub2 = onSnapshot(collection(db, 'artifacts', appId, 'users', user.uid, 'subjects'), (snap) => {
              subjectsData = []; 
              snap.forEach(d => subjectsData.push(d.data()));
              activeDroppedSubjectFilters = subjectsData.filter(s => s.isDroppedInMainList).map(s => s.id);
              renderSubjectsTree();
              processAndRenderWorkspace();
            });
            activeFirestoreUnsubscribes.push(unsub1, unsub2);
          } else {
            loadAndRenderOfflineWorkspace();
          }
        }
      } else {
        appContainer.classList.add('hidden');
        authScreen.classList.remove('hidden');
      }
    }

    window.addEventListener('DOMContentLoaded', () => {
      setInterval(processAndRenderWorkspace, 1000);
      if (firebaseEnabled) {
        onAuthStateChanged(auth, (user) => { handleUserSession(user); });
      } else {
        globalLoader.classList.add('opacity-0', 'pointer-events-none');
        appContainer.classList.remove('hidden');
        loadAndRenderOfflineWorkspace();
      }
    });

    btnLogin.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || !password) return;
      globalLoader.classList.remove('opacity-0', 'pointer-events-none');
      if (firebaseEnabled) {
        try { await signInWithEmailAndPassword(auth, email, password); } catch (error) {
          authErrorMsg.innerText = "Invalid credentials.";
          authErrorMsg.classList.remove('hidden');
          globalLoader.classList.add('opacity-0', 'pointer-events-none');
        }
      }
    });

    btnRegister.addEventListener('click', async (e) => {
      e.preventDefault();
      const email = authEmail.value.trim();
      const password = authPassword.value;
      if (!email || password.length < 6) return;
      globalLoader.classList.remove('opacity-0', 'pointer-events-none');
      if (firebaseEnabled) {
        try { await createUserWithEmailAndPassword(auth, email, password); } catch (error) {
          authErrorMsg.innerText = "Error creating account.";
          authErrorMsg.classList.remove('hidden');
          globalLoader.classList.add('opacity-0', 'pointer-events-none');
        }
      }
    });

    // Google Sign-In with developer logging and user-friendly Simplified error message
    btnGoogle.addEventListener('click', async () => {
      if (!firebaseEnabled) return;
      globalLoader.classList.remove('opacity-0', 'pointer-events-none');
      authErrorMsg.classList.add('hidden');
      
      try {
        const provider = new GoogleAuthProvider();
        provider.setCustomParameters({ prompt: 'select_account' });
        await signInWithPopup(auth, provider);
      } catch (error) {
        globalLoader.classList.add('opacity-0', 'pointer-events-none');
        
        // Log the exact error directly to the console for your developer eyes
        console.error("Firebase Google Auth Error Code:", error.code);
        console.error("Firebase Google Auth Error Message:", error.message);
        
        // Render a clean, friendly, and non-technical message to the user
        let friendlyErrorMessage = "Google Sign-In isn't available right now. Please try logging in with your email or use offline guest mode!";
        if (error.code === 'auth/popup-blocked') {
          friendlyErrorMessage = "The sign-in window was blocked. If you are inside an iframe or Google Site, please sign in with your email and password instead!";
        }
        
        authErrorMsg.innerText = friendlyErrorMessage;
        authErrorMsg.classList.remove('hidden');
      }
    });

    btnGuest.addEventListener('click', () => {
      if (firebaseEnabled) signInAnonymously(auth);
      else loadAndRenderOfflineWorkspace();
    });

    btnLogout.addEventListener('click', () => {
      if (confirm("Are you sure you want to sign out?")) {
        if (firebaseEnabled) signOut(auth);
      }
    });
  </script>
</body>
</html>
